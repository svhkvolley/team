<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVHK Volleyball Team</title>
  <style>
    :root{
      --bg1:#020617;
      --bg2:#08132d;
      --bg3:#09112a;
      --card:#0f172acc;
      --card2:#111827cc;
      --line:#334155;
      --text:#e5e7eb;
      --muted:#94a3b8;
      --yellow:#facc15;
      --blue:#3b82f6;
      --green:#16a34a;
      --red:#ef4444;
      --amber:#f59e0b;
      --pink:#ec4899;
      --shadow: 0 18px 45px rgba(0,0,0,.35);
      --radius: 24px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(30,64,175,.18), transparent 35%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 50%, var(--bg3) 100%);
      min-height:100vh;
    }
    button,input,textarea,select{font:inherit}
    a{text-decoration:none;color:inherit}
    .topbar{
      position:sticky; top:0; z-index:40;
      backdrop-filter: blur(10px);
      background: rgba(2,6,23,.85);
      border-bottom:1px solid rgba(250,204,21,.25);
    }
    .wrap{max-width:1200px;margin:0 auto;padding:10px}
    .topflex{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:12px;cursor:pointer}
    .ball{
      width:30px;height:30px;border-radius:999px;background:rgba(250,204,21,.15);
      border:1px solid rgba(250,204,21,.4);display:grid;place-items:center;
      box-shadow:0 8px 18px rgba(250,204,21,.12);
      font-size:14px;
    }
    .brand h1{
      margin:0;font-size:clamp(16px,1.8vw,22px);line-height:1;font-weight:900;
      text-transform:uppercase;letter-spacing:.03em;color:var(--yellow)
    }
    .subtitle{font-size:9px;color:var(--muted);margin-top:6px}.subtitle:empty{display:none}
    .pillbar{display:flex;gap:4px;background:rgba(15,23,42,.55);border:1px solid rgba(100,116,139,.45);padding:2px;border-radius:10px;box-shadow:none}
    .pill{
      border:0;padding:4px 7px;border-radius:8px;background:transparent;color:#cbd5e1;
      font-weight:600;cursor:pointer;font-size:11px;opacity:.78;line-height:1
    }
    .pill:hover{opacity:1}
    .pill.active.read{background:rgba(59,130,246,.78);color:#fff}
    .pill.active.admin{background:rgba(22,163,74,.78);color:#fff}
    .page{padding:6px 0 14px}
    .stack{display:grid;gap:12px}
    .card{
      background:rgba(15,23,42,.68);
      border:1px solid rgba(30,41,59,1);
      border-radius:16px;
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .card-body{padding:11px}
    .section-title{
      display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:8px
    }
    .section-title h2{
      margin:0;font-size:clamp(16px,1.6vw,20px);font-weight:900;text-transform:uppercase;
      letter-spacing:.03em;color:var(--yellow)
    }
    .action-btn,.btn{
      border:0;border-radius:10px;padding:7px 10px;font-weight:800;cursor:pointer
    }
    .btn-yellow{background:var(--yellow);color:#0f172a}
    .btn-blue{background:var(--blue);color:#fff}
    .btn-green{background:var(--green);color:#fff}
    .btn-slate{background:#334155;color:#fff}
    .btn-red{background:#7f1d1d;color:#fff}
    .field-wrap{max-width:500px;margin:0 auto}
    .court{
      position:relative;aspect-ratio:.78;border-radius:12px;border:3px solid #e2e8f0;
      background:linear-gradient(180deg,#064e3b,#166534);overflow:hidden;
      box-shadow: inset 0 8px 20px rgba(0,0,0,.28);
    }
    .vline,.hline,.net{position:absolute;background:rgba(226,232,240,.82)}
    .vline{top:0;bottom:0;left:50%;width:2px;transform:translateX(-50%)}
    .h1{left:0;right:0;top:33.333%;height:2px}
    .h2{left:0;right:0;top:66.666%;height:2px}
    .net{left:0;right:0;top:40%;height:12px;background:var(--yellow);box-shadow:0 0 18px rgba(250,204,21,.55)}
    .court-label{position:absolute;left:0;right:0;text-align:center;font-weight:900;letter-spacing:.24em;text-transform:uppercase;color:rgba(226,232,240,.2)}
    .court-label.top{top:8px}.court-label.bottom{bottom:8px}
    .token{z-index:2;
      position:absolute;transform:translate(-50%,-50%);
      width:52px;height:52px;border-radius:999px;border:2px solid rgba(255,255,255,.25);
      box-shadow:0 12px 24px rgba(0,0,0,.35);
      display:flex;align-items:center;justify-content:center;text-align:center;
      padding:8px;cursor:grab;background:rgba(15,23,42,.28);backdrop-filter: blur(6px);
    }
        .token small,.token b{font-weight:900;line-height:1;text-align:center;color:#fff;display:flex;align-items:center;justify-content:center;width:100%;height:100%;padding:0;white-space:nowrap;overflow:hidden}
    .token small{font-weight:900;text-align:center;color:#fff;display:flex;align-items:center;justify-content:center;width:100%;height:100%;padding:0;white-space:nowrap;overflow:hidden}
    .token b{font-weight:900;line-height:1;text-align:center;color:#fff;display:flex;align-items:center;justify-content:center;width:100%;height:100%;padding:0;white-space:nowrap;overflow:hidden}
    .c-libero{background:#dc2626;border-color:#fca5a5}
    .c-zuspieler{background:#2563eb;border-color:#93c5fd}
    .c-mb1{background:#16a34a;border-color:#86efac}
    .c-mb2{background:#16a34a;border-color:#86efac}
    .c-aa1{background:#f97316;border-color:#fdba74}
    .c-aa2{background:#f97316;border-color:#fdba74}
    .c-dia{background:#ec4899;border-color:#f9a8d4}
    .c-kapitän{background:#eab308;border-color:#fde68a}
    .c-co-kapitän{background:#f59e0b;border-color:#fcd34d}
    .grid{display:grid;gap:8px}
    .list-card{
      display:flex;justify-content:space-between;align-items:center;gap:8px;
      border-radius:12px;padding:8px;border:1px solid rgba(71,85,105,1);
      background:linear-gradient(90deg, rgba(2,6,23,.45), rgba(30,41,59,.12));
      flex-wrap:wrap;
    }
    .left{display:flex;align-items:center;gap:8px;min-width:170px}
    .iconbox{
      width:34px;height:34px;border-radius:12px;border:1px solid #475569;display:grid;place-items:center;
      background:rgba(2,6,23,.34);font-size:15px
    }
    .title{font-size:14px;font-weight:800}
    .section-hint{
      font-size:11px;
      color:#94a3b8;
      margin:-2px 0 10px;
    }
    button.title-link{
      all: unset !important;
      display:inline-block !important;
      padding:6px 10px !important;
      border-radius:10px !important;
      background:rgba(59,130,246,0.12) !important;
      color:#93c5fd !important;
      font-weight:900 !important;
      cursor:pointer !important;
      border:1px solid rgba(59,130,246,0.4) !important;
      transition:all 0.15s ease !important;
      line-height:1.2 !important;
    }
    button.title-link:hover,
    button.title-link:active{
      background:rgba(59,130,246,0.25) !important;
      transform:translateY(-1px) !important;
      border-color:#93c5fd !important;
      box-shadow:0 0 0 2px rgba(59,130,246,0.15) !important;
    }

    .muted{color:var(--muted)}
    .right{display:flex;align-items:center;gap:8px;margin-left:auto}
    .underline{border-bottom:1px dashed #475569;min-width:160px;padding-bottom:4px}
    .linkicon{background:none;border:0;color:#93c5fd;font-size:14px;cursor:pointer}
    .detail-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .back{background:#334155;color:white;border:0;border-radius:10px;padding:6px 8px;font-weight:700;cursor:pointer}
    .detail-title{
      margin:0;font-size:clamp(18px,2vw,24px);font-weight:900;text-transform:uppercase;color:var(--yellow)
    }
    .hero-center{display:flex;flex-direction:column;align-items:center;text-align:center;gap:16px}
    .hero-img{
      width:108px;height:108px;border-radius:12px;object-fit:cover;border:2px solid rgba(250,204,21,.7);
      box-shadow:0 18px 30px rgba(250,204,21,.08)
    }
    .team-icon{
      width:78px;height:78px;border-radius:24px;border:1px solid rgba(59,130,246,.4);
      background:rgba(2,6,23,.4);display:grid;place-items:center;font-size:28px
    }
    .info-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
    .info-card{background:rgba(30,41,59,.4);border:1px solid #334155;border-radius:12px;padding:9px}
    .info-label{font-size:9px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
    .info-value{font-size:15px}
    .info-value.small{font-size:13px;white-space:pre-wrap}
    .large-value{font-size:28px;font-weight:900;color:var(--yellow);line-height:1}
    .subrole{font-size:14px;color:#cbd5e1}
    .callout{border:1px solid rgba(250,204,21,.55);background:rgba(245,158,11,.1);border-radius:12px;padding:9px;font-size:28px;font-weight:800}
    ul.nice{margin:0;padding-left:16px;font-size:13px;display:grid;gap:8px}
    .message-wrap{display:grid;gap:8px}
    textarea,input,select{
      width:100%;background:rgba(2,6,23,.7);border:1px solid #334155;color:#e5e7eb;
      border-radius:12px;padding:8px 10px
    }
    textarea{min-height:78px;resize:vertical}
    .msg-item{
      display:flex;justify-content:space-between;gap:8px;align-items:flex-start;
      border:1px solid #334155;background:rgba(2,6,23,.5);border-radius:12px;padding:14px
    }
    .chips{display:flex;flex-wrap:wrap;gap:8px}
    .chip{
      border:1px solid #475569;background:#111827;border-radius:999px;padding:7px 10px;
      cursor:pointer
    }
    .banner{border:1px solid rgba(250,204,21,.35);background:rgba(245,158,11,.1);border-radius:12px;padding:8px 10px}
    .modal-backdrop{
      position:fixed;inset:0;background:rgba(2,6,23,.8);backdrop-filter:blur(6px);z-index:60;
      display:flex;align-items:center;justify-content:center;padding:16px
    }
    .modal{
      width:min(640px,100%);max-height:90vh;overflow:auto;background:#1e293b;border:1px solid #64748b;
      border-radius:16px;box-shadow:0 28px 70px rgba(0,0,0,.45);padding:12px
    }
    
    #loginModal{
      align-items:flex-start;
      justify-content:center;
      padding-top:72px;
    }
    #loginModal .modal{
      margin-top:0;
    }
.hidden{display:none !important}
    .team-row{display:flex;gap:12px;align-items:center}
    
    .save-notice{position:fixed;right:16px;bottom:16px;background:#16a34a;color:#fff;padding:10px 14px;border-radius:12px;font-weight:800;box-shadow:0 10px 25px rgba(0,0,0,.25);z-index:90;opacity:0;pointer-events:none;transform:translateY(8px);transition:all .25s ease}.save-notice.show{opacity:1;transform:translateY(0)}
    .event-grid{display:grid;gap:12px}
    .event-card{display:grid;grid-template-columns:120px 1fr;gap:12px;align-items:start;border:1px solid #334155;background:rgba(2,6,23,.42);border-radius:14px;padding:12px}
    .event-thumb{width:120px;height:90px;border-radius:12px;object-fit:cover;background:#0f172a;display:flex;align-items:center;justify-content:center;font-size:28px;color:#94a3b8}
    .section-subtitle{font-size:16px;font-weight:900;color:#facc15;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
    @media (max-width: 860px){.event-card{grid-template-columns:1fr}.event-thumb{width:100%;height:140px}}
    .footer-gap{height:16px}
    .tactic-shell{display:grid;gap:0}
     .bench-zone{
      border:1px solid rgba(71,85,105,1);
      border-bottom:none;
      background:linear-gradient(180deg, rgba(15,23,42,.82), rgba(2,6,23,.76));
      border-radius:14px 14px 0 0;
      padding:8px 10px 6px;
      overflow:hidden;
    }
    .bench-title{
      text-align:center;
      color:var(--muted);
      font-size:11px;
      font-weight:800;
      letter-spacing:.14em;
      text-transform:uppercase;
      margin-bottom:10px;
    }
     .bench-top{
      display:grid;
      grid-template-rows:auto auto;
      gap:8px;
      align-items:center;
      justify-items:center;
    }
    .captain-row{
      display:flex;
      justify-content:center;
      gap:10px;
      align-items:flex-start;
      flex-wrap:nowrap;
    }
     .support-line{
      display:flex;
      justify-content:center;
      gap:8px;
      align-items:flex-start;
      min-height:58px;
      flex-wrap:nowrap;
      width:100%;
    }
    .mini-token-wrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:5px;
      width:60px;
      flex:0 0 auto;
    }
     .bench-token{
      position:relative;
      transform:none;
      left:auto; top:auto;
      width:50px; height:50px;
      margin:0 auto;
      flex:0 0 auto;
    }
     .mini-label{
      font-size:9px;
      line-height:1.0;
      text-align:center;
      color:#e5e7eb;
      font-weight:800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:56px;
    }
    .court.lower-only{
      aspect-ratio:.86;
      background:linear-gradient(180deg,#0b1320 0%, #0b1320 18%, #064e3b 18%, #166534 100%);
      border-top:none;
      border-radius:0 0 14px 14px;
    }
    .court.lower-only .vline{top:18%;bottom:0}
    .court.lower-only .h1{display:none}
    .court.lower-only .h2{top:60%}
    .court.lower-only .net{top:18%}
    .court.lower-only .court-label.top{display:none}
    .court.lower-only .court-label.bottom{bottom:10px;color:rgba(226,232,240,.28)}
    .c-kapitän{background:#eab308;border-color:#fde68a}
    .c-co-kapitän{background:#f59e0b;border-color:#fcd34d}
    @media (max-width: 860px){
      .bench-top{grid-template-rows:auto auto}
      .support-line{gap:6px}
      .bench-token{width:44px;height:44px}
      .mini-token-wrap{width:46px}
      .mini-label{font-size:8px;max-width:48px}
    }


    .podium{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;align-items:end;margin-top:6px}
    .pod-col{display:flex;flex-direction:column;align-items:center;gap:8px}
    .pod-label{font-size:12px;font-weight:900;color:#f8fafc;text-align:center;line-height:1.1}
    .pod-rank{font-size:11px;color:#cbd5e1;font-weight:800}
    .pod-step{width:100%;border-radius:14px 14px 0 0;display:flex;align-items:center;justify-content:center;
      font-weight:900;color:#fff;box-shadow: inset 0 1px 0 rgba(255,255,255,.12)}
    .step-1{height:150px;background:linear-gradient(180deg,#facc15,#ca8a04)}
    .step-2{height:120px;background:linear-gradient(180deg,#94a3b8,#64748b)}
    .step-3{height:95px;background:linear-gradient(180deg,#fb923c,#c2410c)}
    .step-4{height:72px;background:linear-gradient(180deg,#60a5fa,#1d4ed8)}
    @media (max-width: 860px){
      .info-grid{grid-template-columns:1fr}
      .token{z-index:2;width:72px;height:72px}
      .token b{font-weight:900;line-height:1;text-align:center;color:#fff;display:flex;align-items:center;justify-content:center;width:100%;height:100%;padding:0;white-space:nowrap;overflow:hidden}
      .left{min-width:0}
      .title{font-size:15px}
      .info-value{font-size:24px}
      .large-value{font-size:28px}
      .subrole{font-size:14px}
      ul.nice{font-size:15px}
      .callout{font-size:14px}
    }
  
.quick-backdrop{
  position:fixed;
  inset:0;
  z-index:999;
  pointer-events:none;
}
.quick-backdrop.hidden{display:none}
.quick-modal{
  position:fixed;
  width:min(320px, calc(100vw - 24px));
  background:linear-gradient(180deg, rgba(15,23,42,.98), rgba(2,6,23,.98));
  border:1px solid rgba(71,85,105,1);
  border-radius:16px;
  padding:14px;
  box-shadow:0 20px 50px rgba(0,0,0,.35);
  pointer-events:auto;
  animation: quickPop .16s ease;
}
.quick-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.quick-avatar{
  width:48px;height:48px;border-radius:50%;object-fit:cover;flex:0 0 auto;
  border:2px solid rgba(250,204,21,.6);background:rgba(2,6,23,.45);display:grid;place-items:center;
  font-size:22px
}
.quick-title{font-size:22px;font-weight:900;color:var(--yellow);line-height:1.0;margin:0}
.quick-sub{color:#cbd5e1;font-size:13px;margin-top:4px}
.quick-actions{display:flex;gap:8px;flex-wrap:wrap}
.quick-message{min-height:110px;margin-top:12px}
.quick-close{margin-left:auto}
.token .token-player,.token .token-role{pointer-events:none}
@keyframes quickPop{
  from{opacity:0;transform:translate(-50%, -92%) scale(.97)}
  to{opacity:1;transform:translate(-50%, -100%) scale(1)}
}


    .team-player-chip{
      background:linear-gradient(135deg, #1e293b, #0f172a);
      border:1px solid #38bdf8;
      color:#e0f2fe;
      font-weight:900;
      box-shadow:0 0 8px rgba(56,189,248,0.35);
    }


    .image-lightbox-backdrop{
      position:fixed; inset:0; background:rgba(2,6,23,.72);
      z-index:10020; display:flex; align-items:center; justify-content:center;
      padding:20px;
    }
    .image-lightbox-backdrop.hidden{display:none}
    .image-lightbox-box{
      position:fixed;
      max-width:min(92vw, 980px);
      max-height:min(86vh, 860px);
      width:auto;
      background:rgba(15,23,42,.96);
      border:1px solid rgba(148,163,184,.35);
      border-radius:20px;
      box-shadow:0 24px 70px rgba(0,0,0,.45);
      overflow:hidden;
    }
    .image-lightbox-img{
      display:block;
      max-width:min(92vw, 980px);
      max-height:min(78vh, 760px);
      width:auto;
      height:auto;
      object-fit:contain;
      background:#020617;
    }
    .zoomable-image{cursor:zoom-in}
    .image-lightbox-close{
  position:fixed;
  top:16px;
  right:16px;
  z-index:10050;
  width:44px;
  height:44px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(15,23,42,0.85);
  border:1px solid rgba(148,163,184,0.5);
  box-shadow:0 8px 24px rgba(0,0,0,0.4);
  backdrop-filter: blur(6px);
}
.image-lightbox-close:hover{
  transform:scale(1.05);
}


    .gallery-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
      gap:10px;
      margin-top:8px;
    }
    .gallery-item{
      position:relative;
      border-radius:14px;
      overflow:hidden;
      border:1px solid rgba(148,163,184,.25);
      background:rgba(2,6,23,.4);
      aspect-ratio:1/1;
    }
    .gallery-thumb{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .gallery-remove{
      position:absolute;
      top:6px;
      right:6px;
      z-index:2;
      padding:4px 8px;
      border-radius:999px;
    }


    .pool-card{
      display:grid;
      gap:10px;
      padding:14px;
      border:1px solid rgba(56,189,248,.28);
      border-radius:16px;
      background:linear-gradient(180deg, rgba(2,6,23,.34), rgba(15,23,42,.5));
    }
    .pool-grid{
      display:grid;
      gap:12px;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    }
    .pool-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .pool-name{
      font-size:18px;
      font-weight:900;
      color:#f8fafc;
    }
    .pool-meta{
      color:#cbd5e1;
      font-size:13px;
      line-height:1.4;
    }
    .pool-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }


/* Kleines optisches Upgrade der ursprünglichen Aufstellung */
.tactic-shell{
  background:
    radial-gradient(circle at 50% 18%, rgba(250,204,21,.10), transparent 28%),
    rgba(15,23,42,.18);
  border-radius:22px;
  padding:10px;
}
.court{
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08), 0 18px 44px rgba(0,0,0,.22) !important;
  border:1px solid rgba(250,204,21,.20) !important;
}
.token{
  border:2px solid rgba(250,204,21,.22) !important;
  background:linear-gradient(180deg, rgba(15,23,42,.88), rgba(2,6,23,.82)) !important;
  box-shadow:0 12px 26px rgba(0,0,0,.26) !important;
}
.token:hover{
  border-color:rgba(250,204,21,.48) !important;
  box-shadow:0 16px 34px rgba(0,0,0,.34) !important;

        hallOfFameLogo: parsed.hallOfFameLogo || "",
        leagueSeason: parsed.leagueSeason || { name: "2025/26", status: "laufend", startedAt: Date.now() },
        leagueSeasonHistory: Array.isArray(parsed.leagueSeasonHistory) ? parsed.leagueSeasonHistory : [],
        messages: (parsed.messages || []).map(m => ({ seenByAdmin: true, ...m })),
        comments: Array.isArray(parsed.comments) ? parsed.comments : []
      };
    }

    async function loadRemoteState() {
      if (!supabase) return null;
      const { data, error } = await supabase
        .from(SUPABASE_STATE_TABLE)
        .select("state_json")
        .eq("id", SUPABASE_STATE_ROW_ID)
        .single();
      if (error) throw error;
      return normalizeLoadedState(data?.state_json);
    }

    async function saveRemoteState() {
      if (!supabase || !remoteReady) return;
      const { error } = await supabase
        .from(SUPABASE_STATE_TABLE)
        .upsert({ id: SUPABASE_STATE_ROW_ID, state_json: state }, { onConflict: "id" });
      if (error) throw error;
    }

    async function commitChange(noticeText = "Gespeichert") {
      saveData();
      render();
      if (!supabase || !remoteReady) {
        showSaveNotice(noticeText);
        return;
      }
      try {
        setSyncStatus("Sync: speichert…");
        await saveRemoteState();
        setSyncStatus("Sync: verbunden");
        showSaveNotice(noticeText);
      } catch (err) {
        console.error("Supabase sync failed", err);
        setSyncStatus("Sync: Fehler");
        showSaveNotice("Supabase-Sync fehlgeschlagen");
      }
    }

    function setupRealtime() {
      if (!supabase) return;
      supabase
        .channel("svhk-app-state")
        .on("postgres_changes",
          { event: "UPDATE", schema: "public", table: SUPABASE_STATE_TABLE, filter: `id=eq.${SUPABASE_STATE_ROW_ID}` },
          (payload) => {
            if (suppressRemoteApply) return;
            const nextState = payload?.new?.state_json;
            if (!nextState) return;
            state = normalizeLoadedState(nextState);
            saveData();
            render();
            setSyncStatus("Sync: verbunden");
          }
        )
        .subscribe();
    }

    async function bootstrapSync() {
      try {
        setSyncStatus("Sync: lädt…");
        if (!supabase) {
          setSyncStatus("Sync: ohne Cloud");
          render();
          return;
        }
        const remoteState = await loadRemoteState();
        if (remoteState) {
          state = remoteState;
          saveData();
        }
        remoteReady = true;
        render();
        setupRealtime();
        setSyncStatus("Sync: verbunden");
      } catch (err) {
        console.error("Supabase bootstrap failed", err);
        remoteReady = false;
        render();
        setSyncStatus("Sync: Fehler");
      }
    }

    function showSaveNotice(text = "Gespeichert") {
      let note = document.getElementById("saveNotice");
      if (!note) {
        note = document.createElement("div");
        note.id = "saveNotice";
        note.className = "save-notice";
        document.body.appendChild(note);
      }
      note.textContent = text;
      note.classList.add("show");
      clearTimeout(window.__saveNoticeTimer);
      window.__saveNoticeTimer = setTimeout(() => note.classList.remove("show"), 1800);
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return structuredClone(initialData);
        const parsed = JSON.parse(raw);
        const mergedRoles = [
          ...structuredClone(initialData.roles),
          ...((parsed.roles || []).filter(savedRole => !initialData.roles.some(initialRole => initialRole.id === savedRole.id)))
        ];
        return {
          ...structuredClone(initialData),
          ...parsed,
          roles: mergedRoles,
          players: parsed.players?.length ? parsed.players.map(p => ({ leagueTeamId: "", nickname: "", ...p })) : structuredClone(initialData.players),
          teams: parsed.teams?.length
            ? parsed.teams.map(team => {
                const initialTeam = initialData.teams.find(t => t.id === team.id);
                return { ...(initialTeam || {}), ...team, gallery: Array.isArray(team.gallery) ? team.gallery : [] };
              })
            : structuredClone(initialData.teams),
          upcomingEvents: Array.isArray(parsed.upcomingEvents) ? parsed.upcomingEvents.map(e => ({ ...e, gallery: Array.isArray(e.gallery) ? e.gallery : [] })) : structuredClone(initialData.upcomingEvents),
          pastEvents: Array.isArray(parsed.pastEvents) ? parsed.pastEvents.map(e => ({ ...e, gallery: Array.isArray(e.gallery) ? e.gallery : [] })) : structuredClone(initialData.pastEvents),
          clubInfo: parsed.clubInfo ? { ...structuredClone(initialData.clubInfo), ...parsed.clubInfo } : structuredClone(initialData.clubInfo),
          leagueTeams: parsed.leagueTeams?.length ? parsed.leagueTeams.map(t => ({ captainPlayerId: "", coCaptainPlayerId: "", mvpStats: [], gallery: [], ...t, mvpStats: Array.isArray(t.mvpStats) ? t.mvpStats : [], gallery: Array.isArray(t.gallery) ? t.gallery : [] })) : structuredClone(initialData.leagueTeams),
          boardTokens: parsed.boardTokens?.length ? parsed.boardTokens : structuredClone(initialData.boardTokens),
          votings: Array.isArray(parsed.votings) ? parsed.votings : [],
        awardHistory: Array.isArray(parsed.awardHistory) ? parsed.awardHistory : [],
        hallOfFameLogo: parsed.hallOfFameLogo || "",
        leagueSeason: parsed.leagueSeason || { name: "2025/26", status: "laufend", startedAt: Date.now() },
        leagueSeasonHistory: Array.isArray(parsed.leagueSeasonHistory) ? parsed.leagueSeasonHistory : [],
        messages: (parsed.messages || []).map(m => ({ seenByAdmin: true, ...m })),
        comments: Array.isArray(parsed.comments) ? parsed.comments : []
        };
      } catch {
        return structuredClone(initialData);
      }
    }

    function uid() {
      return Math.random().toString(36).slice(2, 10);
    }

    function slugKey(text="") {
      return text.toLowerCase().trim();
    }

    function clamp(v, min, max) {
      return Math.min(Math.max(v, min), max);
    }

    function getRole(id) {
      return state.roles.find(r => r.id === id || r.shortId === id);
    }
    function getPlayer(id) {
      return state.players.find(p => p.id === id);
    }
    function getTeam(id) {
      return state.teams.find(t => t.id === id);
    }
    function getLeagueTeam(id) {
      return state.leagueTeams.find(t => t.id === id);
    }
    async function uploadGenericImage(file, itemId, folder="misc") {
      if (!supabase) throw new Error("Supabase ist nicht konfiguriert.");
      const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
      const filePath = `${folder}/${itemId}-${Date.now()}.${ext}`;
      const { error } = await supabase.storage.from(SUPABASE_BUCKET).upload(filePath, file, {
        cacheControl: "3600",
        upsert: true,
        contentType: file.type || "image/jpeg"
      });
      if (error) throw error;
      return filePath;
    }

    async function uploadMultipleGalleryImages(files, itemId, folder="gallery") {
      const uploaded = [];
      for (const file of Array.from(files || [])) {
        const path = await uploadGenericImage(file, `${itemId}-${uid()}`, folder);
        uploaded.push(path);
      }
      return uploaded;
    }
    function getUnseenCount(playerId) {
      return state.messages.filter(m => m.playerId === playerId && m.seenByAdmin === false).length;
    }
    function getPlayerByRole(role) {
      return role?.playerId ? getPlayer(role.playerId) : null;
    }
    function getRoleByPlayer(player) {
      return player?.roleId ? getRole(player.roleId) : null;
    }
    function getTeamByPlayer(player) {
      return player?.teamId ? getTeam(player.teamId) : null;
    }

    function getAutoTeamPlayers(team) {
      if (!team) return [];
      const explicit = state.players.filter(p => p.teamId === team.id);
      const roleLinked = state.roles
        .map(role => role?.playerId ? getPlayer(role.playerId) : null)
        .filter(p => p && p.teamId === team.id);
      const speaker = team.speakerPlayerId ? getPlayer(team.speakerPlayerId) : null;
      const all = [...explicit, ...roleLinked, ...(speaker && speaker.teamId === team.id ? [speaker] : [])];
      const seen = new Set();
      return all.filter(p => {
        if (!p || seen.has(p.id)) return false;
        seen.add(p.id);
        return true;
      });
    }

    function getAutoLeaguePlayers(team) {
      if (!team) return [];
      const explicit = state.players.filter(p => (team.playerIds || []).includes(p.id));
      const linked = state.players.filter(p => p.leagueTeamId === team.id);
      const all = [...explicit, ...linked];
      const seen = new Set();
      return all.filter(p => {
        if (!p || seen.has(p.id)) return false;
        seen.add(p.id);
        return true;
      });
    }

    function syncLeagueTeamMemberships() {
      state.leagueTeams = state.leagueTeams.map(team => ({
        ...team,
        playerIds: [...new Set((team.playerIds || []).filter(id => {
          const p = getPlayer(id);
          return !!p && (p.leagueTeamId === team.id || (team.playerIds || []).includes(id));
        }))]
      }));
      state.players.forEach(player => {
        if (player.leagueTeamId) {
          const team = state.leagueTeams.find(t => t.id === player.leagueTeamId);
          if (team) team.playerIds = [...new Set([...(team.playerIds || []), player.id])];
        }
      });
    }

    function createPoolPlayer(name) {
      const trimmed = String(name || "").trim();
      if (!trimmed) return null;
      let id = slugKey(trimmed).replace(/[^a-z0-9äöüß-]/gi, "-");
      if (!id) id = uid();
      while (state.players.some(p => p.id === id)) id = `${id}-${uid().slice(0,4)}`;
      const player = {
        id,
        name: trimmed,
        image:"",
        roleId:"",
        teamId:"",
        strength:"",
        funFact:"",
        leagueTeamId:"",
        nickname:""
      };
      state.players.push(player);
      return player;
    }

    function getPlayerPoolSubtitle(player) {
      const role = getRoleByPlayer(player);
      const speakerTeams = state.teams.filter(t => t.speakerPlayerId === player.id).map(t => `${t.name} Sprecher`);
      const captainTeams = state.leagueTeams.filter(t => t.captainPlayerId === player.id).map(t => `${t.name} Kapitän`);
      const coCaptainTeams = state.leagueTeams.filter(t => t.coCaptainPlayerId === player.id).map(t => `${t.name} Co-Kapitän`);
      const parts = [];
      if (role?.title) parts.push(role.title);
      if (speakerTeams.length) parts.push(...speakerTeams);
      if (captainTeams.length) parts.push(...captainTeams);
      if (coCaptainTeams.length) parts.push(...coCaptainTeams);
      return parts.length ? parts.join(" · ") : "Noch nirgends eingetragen";
    }

    function getPlayerMvpTotal(playerId) {
      return state.leagueTeams.reduce((sum, team) => {
        const teamTotal = (team.mvpStats || [])
          .filter(m => m.playerId === playerId)
          .reduce((inner, m) => inner + (Number(m.count || 0) || 0), 0);
        return sum + teamTotal;
      }, 0);
    }

    function getPlayerMvpBreakdown(playerId) {
      return state.leagueTeams
        .map(team => {
          const teamTotal = (team.mvpStats || [])
            .filter(m => m.playerId === playerId)
            .reduce((inner, m) => inner + (Number(m.count || 0) || 0), 0);
          return teamTotal > 0 ? `${team.name}: ${teamTotal}` : null;
        })
        .filter(Boolean);
    }

    function createStandaloneTeamPlayer(teamId, name) {
      const player = createPlayer(name, "", teamId);
      return player;
    }

    function renamePlayer(playerId, newName) {
      const player = getPlayer(playerId);
      const trimmed = String(newName || "").trim();
      if (!player || !trimmed) return null;
      player.name = trimmed;
      return player;
    }

    function createPlayer(name, roleId = "", teamId = "") {
      const trimmed = String(name || "").trim();
      if (!trimmed) return null;
      let id = slugKey(trimmed);
      if (!id) id = uid();
      while (state.players.some(p => p.id === id)) id = `${id}-${uid().slice(0,4)}`;
      const player = { id, name: trimmed, image: "", roleId: roleId || "", teamId: teamId || "", strength: "", funFact: "" };
      state.players.push(player);
      return player;
    }

    function detachRolePlayer(role) {
      const player = getPlayer(role?.playerId);
      if (player && player.roleId === role.id) player.roleId = "";
      if (role) role.playerId = "";
    }

    function detachSpeakerPlayer(team) {
      if (team) team.speakerPlayerId = "";
    }

    function isMessageEnabledForPlayer(player) {
      if (!player) return false;
      if (player.roleId) return true;
      if (state.teams.some(team => team.speakerPlayerId === player.id)) return true;
      if (state.leagueTeams.some(team => team.captainPlayerId === player.id || team.coCaptainPlayerId === player.id)) return true;
      return false;
    }

    function removePlayerCompletely(playerId) {
      state.players = state.players.filter(p => p.id !== playerId);
      state.messages = state.messages.filter(m => m.playerId !== playerId);
      state.roles = state.roles.map(role => role.playerId === playerId ? { ...role, playerId: "" } : role);
      state.teams = state.teams.map(team => ({
        ...team,
        speakerPlayerId: team.speakerPlayerId === playerId ? "" : team.speakerPlayerId
      }));
      state.leagueTeams = state.leagueTeams.map(team => ({
        ...team,
        captainPlayerId: team.captainPlayerId === playerId ? "" : team.captainPlayerId,
        coCaptainPlayerId: team.coCaptainPlayerId === playerId ? "" : team.coCaptainPlayerId,
        playerIds: (team.playerIds || []).filter(id => id !== playerId),
        mvpStats: (team.mvpStats || []).filter(m => m.playerId !== playerId)
      }));
    }

    function positionQuickToken(el) {
      const rect = el.getBoundingClientRect();
      const scrollX = window.scrollX || window.pageXOffset || 0;
      const scrollY = window.scrollY || window.pageYOffset || 0;

      quickTokenModal.style.position = "absolute";
      quickTokenModal.style.left = "0px";
      quickTokenModal.style.top = "0px";
      quickTokenModal.style.width = Math.max(document.documentElement.scrollWidth, window.innerWidth) + "px";
      quickTokenModal.style.height = Math.max(document.documentElement.scrollHeight, window.innerHeight) + "px";

      const box = quickTokenBox;
      const boxWidth = Math.min(320, window.innerWidth - 24);
      box.style.position = "absolute";
      box.style.width = boxWidth + "px";
      box.style.visibility = "hidden";
      box.style.display = "block";

      const boxHeight = box.offsetHeight || 220;

      let leftViewport = rect.left + rect.width / 2;
      leftViewport = Math.max(12 + boxWidth / 2, Math.min(window.innerWidth - 12 - boxWidth / 2, leftViewport));

      let topViewport = rect.top - 10;
      let transform = "translate(-50%, -100%)";

      if (topViewport - boxHeight < 8) {
        topViewport = rect.bottom + 10;
        transform = "translate(-50%, 0)";
      }

      // Convert viewport position to document position
      const leftDocument = leftViewport + scrollX;
      const topDocument = topViewport + scrollY;

      box.style.left = leftDocument + "px";
      box.style.top = topDocument + "px";
      box.style.transform = transform;
      box.style.visibility = "visible";
      box.style.display = "";
    }

      if (!supabase) throw new Error("Supabase ist nicht konfiguriert.");
      const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
      const filePath = `players/${playerId}-${Date.now()}.${ext}`;
      const { error } = await supabase.storage.from(SUPABASE_BUCKET).upload(filePath, file, {
        cacheControl: "3600",
        upsert: true,
        contentType: file.type || "image/jpeg"
      });
      if (error) throw error;
      return filePath;
    }

    function setRoute(type, id = null, options = {}) {
      route = { type, id, backRoute: options.backRoute || null };
      render();
    }

    function getParentRoute(current = route) {
      if (current.backRoute) return { type: current.backRoute, id: null };
      switch (current.type) {
        case "team":
          return { type: "teams", id: null };
        case "league":
          return { type: "leagueoverview", id: null };
        case "role":
          return { type: "roles", id: null };
        case "player":
          return { type: "playerpool", id: null };
        case "teams":
        case "leagueoverview":
        case "roles":
        case "playerpool":
        case "voting":
          return { type: "home", id: null };
        case "votingmanager":
          return { type: "halloffame", id: null };
        case "halloffame":
        case "events":
        case "clubinfo":
          return { type: "home", id: null };
        default:
          return { type: "home", id: null };
      }
    }

    function goBackLevel(explicitRoute = "") {
      if (route.backRoute) {
        setRoute(route.backRoute, null);
        return;
      }
      if (explicitRoute) {
        setRoute(explicitRoute, null);
        return;
      }
      const parent = getParentRoute(route);
      setRoute(parent.type, parent.id);
    }

    function getPlayerVotingMeta(playerId) {
      const player = getPlayer(playerId);

      const teamNames = (state.teams || [])
        .filter(team => {
          const ids = [
            ...(Array.isArray(team.playerIds) ? team.playerIds : []),
            ...(Array.isArray(team.members) ? team.members : []),
            ...(Array.isArray(team.stammspielerIds) ? team.stammspielerIds : []),
            ...(Array.isArray(team.players) ? team.players : [])
          ];
          return ids.includes(playerId) || team.speakerPlayerId === playerId || player?.teamId === team.id;
        })
        .map(team => team.name)
        .filter(Boolean);

      const leagueNames = (state.leagueTeams || [])
        .filter(team => {
          const ids = [
            ...(Array.isArray(team.playerIds) ? team.playerIds : []),
            ...(Array.isArray(team.members) ? team.members : []),
            ...(Array.isArray(team.stammspielerIds) ? team.stammspielerIds : []),
            ...(Array.isArray(team.players) ? team.players : [])
          ];
          return ids.includes(playerId) || team.captainPlayerId === playerId || player?.leagueTeamId === team.id;
        })
        .map(team => team.name)
        .filter(Boolean);

      const uniqueTeams = [...new Set(teamNames)];
      const uniqueLeagues = [...new Set(leagueNames)];

      const parts = [];
      if (uniqueTeams.length) parts.push(uniqueTeams.join(", "));
      if (uniqueLeagues.length) parts.push("Liga: " + uniqueLeagues.join(", "));
      const captainTeams = (state.leagueTeams || []).filter(t => t.captainPlayerId === playerId).map(t => t.name);
      const coCaptainTeams = (state.leagueTeams || []).filter(t => t.coCaptainPlayerId === playerId).map(t => t.name);
      if (captainTeams.length) parts.push("Kapitän: " + [...new Set(captainTeams)].join(", "));
      if (coCaptainTeams.length) parts.push("Co: " + [...new Set(coCaptainTeams)].join(", "));

      return parts.join(" · ");
    }


    function getAllAwardCategoriesFlat() {
      const awards = getAwardCategories();

    function getAwardById(awardId) {
      return getAllAwardCategoriesFlat().find(a => a.id === awardId);
    }

    function evaluateVoting(voting) {
      if (!voting) return [];
      const awardIds = voting.awardIds || (voting.awardId ? [voting.awardId] : []);
      const votes = voting.votes || {};
      const results = [];

      awardIds.forEach(awardId => {
        const counts = {};
        Object.values(votes).forEach(ballot => {
          const playerId = ballot?.[awardId];
          if (!playerId) return;
          counts[playerId] = (counts[playerId] || 0) + 1;
        });

        const entries = Object.entries(counts)
          .map(([playerId, count]) => ({ playerId, count }))
          .sort((a, b) => b.count - a.count || (getPlayer(a.playerId)?.name || "").localeCompare(getPlayer(b.playerId)?.name || "", "de"));

        if (!entries.length) {
          results.push({ awardId, winnerPlayerId: "", count: 0, totalVotes: 0, ranking: [] });
          return;
        }

        const topCount = entries[0].count;
        const winners = entries.filter(e => e.count === topCount).map(e => e.playerId);
        results.push({
          awardId,
          winnerPlayerId: winners[0],
          winnerPlayerIds: winners,
          count: topCount,
          totalVotes: entries.reduce((sum, e) => sum + e.count, 0),
          ranking: entries,
          tie: winners.length > 1
        });
      });
      return results;
    }


    function renderVotingStats(voting, allAwards) {
      const results = evaluateVoting(voting);
      if (!results.length) return `<div class="muted">Noch keine Stimmen.</div>`;

      return `
        <div class="grid" style="gap:7px">
          ${results.map(r => {
            const award = allAwards.find(a => a.id === r.awardId);
            const ranking = r.ranking || [];
            return `<div class="info-card" style="padding:8px;background:rgba(2,6,23,.28)">
              <div class="info-label">${award ? award.icon + " " + escapeHtml(award.title) : escapeHtml(r.awardId)}</div>
              ${ranking.length
                ? `<div class="grid" style="gap:4px">
                    ${ranking.slice(0,5).map((entry, idx) => {
                      const player = getPlayer(entry.playerId);
                      return `<div class="muted">${idx + 1}. ${escapeHtml(player?.name || "Unbekannt")} · ${entry.count} Stimme${entry.count === 1 ? "" : "n"}</div>`;
                    }).join("")}
                  </div>`
                : `<div class="muted">Noch keine Stimme.</div>`}
            </div>`;
          }).join("")}
        </div>
      `;
    }

    function closeAndEvaluateVoting(votingId) {
      const voting = (state.votings || []).find(v => v.id === votingId);
      if (!voting) return false;
      voting.results = evaluateVoting(voting);
      voting.active = false;
      voting.closed = true;
      voting.closedAt = Date.now();

      state.awardHistory = Array.isArray(state.awardHistory) ? state.awardHistory : [];
      voting.results.forEach(result => {
        if (!result.winnerPlayerId) return;
        const award = getAwardById(result.awardId);
        state.awardHistory.push({
          id: uid(),
          votingId: voting.id,
          votingTitle: voting.title || "Spieltagsvoting",
          awardId: result.awardId,
          awardTitle: award?.title || result.awardId,
          awardIcon: award?.icon || "🏅",
          winnerPlayerId: result.winnerPlayerId,
          winnerPlayerIds: result.winnerPlayerIds || [result.winnerPlayerId],
          count: result.count || 0,
          totalVotes: result.totalVotes || 0,
          tie: !!result.tie,
          createdAt: voting.closedAt
        });
      });
      return true;
    }

    function getPlayerAwards(playerId) {
      return (state.awardHistory || []).filter(a =>

      });
    }

    function getHallOfFameWinnersForAward(awardId) {
      const map = new Map();
      (state.awardHistory || []).filter(entry => entry.awardId === awardId).forEach(entry => {
        const winnerIds = entry.winnerPlayerIds || (entry.winnerPlayerId ? [entry.winnerPlayerId] : []);
        winnerIds.forEach(playerId => {
          if (!playerId) return;
          if (!map.has(playerId)) {
            map.set(playerId, { playerId, count: 0, entries: [] });
          }
          const item = map.get(playerId);
          item.count += 1;
          item.entries.push(entry);
        });
      });
      return Array.from(map.values())
        .sort((a, b) => b.count - a.count || (getPlayer(a.playerId)?.name || "").localeCompare(getPlayer(b.playerId)?.name || "", "de"));
    }

    function getLeagueMatches(team) {
      if (!team) return [];
      if (Array.isArray(team.matches)) return team.matches;
      return [];
    }

    function calculateLeagueSeasonStats(team) {
      const matches = getLeagueMatches(team);
      let wins = 0;
      let losses = 0;
      let setsFor = 0;
      let setsAgainst = 0;
      let pointsFor = 0;
      let pointsAgainst = 0;

      matches.forEach(match => {
        const own = Number(match.ownScore || 0);
        const opp = Number(match.opponentScore || 0);
        if (own > opp) wins++;
        else if (opp > own) losses++;

        setsFor += own;
        setsAgainst += opp;

        (match.sets || []).forEach(set => {
          pointsFor += Number(set.own || 0);
          pointsAgainst += Number(set.opponent || 0);
        });
      });

      return {
        wins,
        losses,
        setRatio: `${setsFor}:${setsAgainst}`,
        pointRatio: `${pointsFor}:${pointsAgainst}`,
        matches: matches.length
      };
    }

    
    function calculateLeagueMvpStatsFromMatches(team) {
      const counts = new Map();
      getLeagueMatches(team).forEach(match => {
        const ids = [
          match.mvpPlayerId,
          match.mvpPlayerId2,
          ...(Array.isArray(match.mvpPlayerIds) ? match.mvpPlayerIds : [])
        ].filter(Boolean);

        [...new Set(ids)].forEach(playerId => {
          counts.set(playerId, (counts.get(playerId) || 0) + 1);
        });
      });
      return Array.from(counts.entries())
        .map(([playerId, count]) => ({ playerId, count }))
        .sort((a,b) => b.count - a.count);
    }

function renderLeagueMatchList(team) {
      const matches = getLeagueMatches(team).slice().sort((a,b) => (a.date || "").localeCompare(b.date || ""));

      return `<div class="match-list">

          const cls = own > opp ? "win" : opp > own ? "loss" : "";
          const icon = own > opp ? "✅" : opp > own ? "❌" : "➖";
          const sets = (match.sets || []).filter(s => s.own !== "" && s.opponent !== "").map(s => `${s.own}:${s.opponent}`).join(" · ");
          return `<div class="match-card ${cls}">

    function closeImageLightbox() {
      imageLightbox.classList.add("hidden");
      imageLightboxImg.src = "";
      imageLightboxImg.alt = "";
      imageLightboxBox.style.left = "";
      imageLightboxBox.style.top = "";
      imageLightboxBox.style.transform = "";
    }

    function openImageLightboxFromElement(el) {
      if (!el || adminMode) return;
      const src = el.getAttribute("src");
      if (!src) return;

      imageLightboxImg.src = src;
      imageLightboxImg.alt = el.getAttribute("alt") || "";
      imageLightbox.classList.remove("hidden");

      const rect = el.getBoundingClientRect();
      const viewportW = window.innerWidth;
      const viewportH = window.innerHeight;
      const boxW = Math.min(980, viewportW - 24);
      const boxH = Math.min(860, viewportH - 24);

      let left = rect.left + rect.width / 2;
      let top = rect.top + rect.height / 2;

      left = Math.max(boxW / 2 + 12, Math.min(viewportW - boxW / 2 - 12, left));
      top = Math.max(boxH / 2 + 12, Math.min(viewportH - boxH / 2 - 12, top));

      imageLightboxBox.style.left = left + "px";
      imageLightboxBox.style.top = top + "px";
      imageLightboxBox.style.transform = "translate(-50%, -50%)";
    }

          card.classList.toggle("selected", toggle.checked);

            card.querySelectorAll('input[name="vote-' + CSS.escape(awardId) + '"]').forEach(r => r.checked = false);
          }
        });
      });

      document.getElementById("saveVotingBallotBtn")?.addEventListener("click", async () => {
        if (!voting || voting.closed || !voting.active) return;
        const voterId = getVotingDeviceId();
        const awards = getVotingAwardList(voting);
        voting.votes = voting.votes || {};
        voting.votes[voterId] = voting.votes[voterId] || {};
        awards.forEach(award => {
          const enabled = document.querySelector('[data-vote-award-toggle="' + CSS.escape(award.id) + '"]')?.checked;
          if (!enabled) {
            delete voting.votes[voterId][award.id];
            return;
          }
          const checked = document.querySelector('input[name="vote-' + CSS.escape(award.id) + '"]:checked');
          if (checked?.value) voting.votes[voterId][award.id] = checked.value;
          else delete voting.votes[voterId][award.id];
        });
        await commitChange("Stimmen gespeichert");
      });
    }

    function bindPlayerPoolSearch() {
      const input = document.getElementById("playerPoolSearchInput");
      const count = document.getElementById("playerPoolSearchCount");
      if (!input) return;

      const cards = Array.from(document.querySelectorAll("[data-playerpool-card]"));

      const update = () => {
        const q = (input.value || "").trim().toLowerCase();
        let visible = 0;

        cards.forEach(card => {
          const hay = card.dataset.playerpoolSearch || "";
          const show = !q || hay.includes(q);
          card.classList.toggle("playerpool-hidden", !show);
          if (show) visible++;
        });

        if (count) count.textContent = `${visible} Treffer`;
      };

      input.addEventListener("input", update);
      update();
    }

function bindPlayerPool() {
      bindCommonLinks();
      if (!adminMode) return;

      document.getElementById("addPoolPlayerBtn")?.addEventListener("click", async () => {
        const input = document.getElementById("newPoolPlayerName");
        const name = (input?.value || "").trim();
        if (!name) return;
        createPoolPlayer(name);
        if (input) input.value = "";
        await commitChange("Spieler hinzugefügt");
      });

      document.querySelectorAll("[data-delete-pool-player]").forEach(btn => {
        btn.addEventListener("click", async () => {
          removePlayerCompletely(btn.dataset.deletePoolPlayer);
          await commitChange("Spieler entfernt");
        });
      });

      const saveHandler = async () => {
        state.players.forEach(player => {
          const nameEl = document.querySelector(`[data-pool-player-name="${player.id}"]`);
          const teamEl = document.querySelector(`[data-pool-player-team="${player.id}"]`);
          const leagueEl = document.querySelector(`[data-pool-player-league="${player.id}"]`);
          const roleEl = document.querySelector(`[data-pool-player-role="${player.id}"]`);
          const speakerEl = document.querySelector(`[data-pool-player-speaker="${player.id}"]`);
          const leagueCaptainEl = document.querySelector(`[data-pool-player-league-captain="${player.id}"]`);
          const leagueCoCaptainEl = document.querySelector(`[data-pool-player-league-cocaptain="${player.id}"]`);
          const nicknameEl = document.querySelector(`[data-pool-player-nickname="${player.id}"]`);

          const newName = (nameEl?.value || "").trim();
          if (newName) player.name = newName;
          player.teamId = teamEl?.value || "";
          player.leagueTeamId = leagueEl?.value || "";
          player.roleId = roleEl?.value || "";
          player.nickname = nicknameEl?.value || "";
          player._speakerTeamId = speakerEl?.value || "";
          player._leagueCaptainTeamId = leagueCaptainEl?.value || "";
          player._leagueCoCaptainTeamId = leagueCoCaptainEl?.value || "";
        });

        state.roles = state.roles.map(role => ({ ...role, playerId: "" }));
        state.players.forEach(player => {
          if (player.roleId) {
            const role = state.roles.find(r => r.id === player.roleId);
            if (role) role.playerId = player.id;
          }
        });

        state.teams = state.teams.map(team => ({ ...team, speakerPlayerId: "" }));
        state.players.forEach(player => {
          if (player._speakerTeamId) {
            const team = state.teams.find(t => t.id === player._speakerTeamId);
            if (team) team.speakerPlayerId = player.id;
          }
          delete player._speakerTeamId;
        });

        state.leagueTeams = state.leagueTeams.map(team => ({ ...team, captainPlayerId: "", coCaptainPlayerId: "" }));
        state.players.forEach(player => {
          if (player._leagueCaptainTeamId) {
            const team = state.leagueTeams.find(t => t.id === player._leagueCaptainTeamId);
            if (team) {
              team.captainPlayerId = player.id;
              player.leagueTeamId = team.id;
              team.playerIds = [...new Set([...(team.playerIds || []), player.id])];
            }
          }
          if (player._leagueCoCaptainTeamId) {
            const team = state.leagueTeams.find(t => t.id === player._leagueCoCaptainTeamId);
            if (team) {
              team.coCaptainPlayerId = player.id;
              player.leagueTeamId = team.id;
              team.playerIds = [...new Set([...(team.playerIds || []), player.id])];
            }
          }
          delete player._leagueCaptainTeamId;
          delete player._leagueCoCaptainTeamId;
        });

        syncLeagueTeamMemberships();
        await commitChange("Spielerpool gespeichert");
      };

      document.getElementById("savePlayerPoolBtn")?.addEventListener("click", saveHandler);
      document.getElementById("savePlayerPoolBtnTop")?.addEventListener("click", saveHandler);
      // minimal autosave on change/blur
      const autoSave = () => { saveHandler(); };
      document.querySelectorAll("[data-pool-player-name], [data-pool-player-team], [data-pool-player-league], [data-pool-player-role], [data-pool-player-speaker], [data-pool-player-league-captain], [data-pool-player-league-cocaptain], [data-pool-player-nickname]")
        .forEach(el => {
          el.addEventListener("change", autoSave);
          el.addEventListener("blur", autoSave);
        });

    }

    function escapeHtml(str="") {
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }

    function escapeAttr(str="") {
      return escapeHtml(str).replaceAll("\n","&#10;");
    }
